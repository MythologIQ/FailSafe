name: Release Pipeline

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      diff_category:
        description: "Change category for SemVer bump validation"
        required: false
        default: "none"
        type: choice
        options:
          - none
          - fix
          - feature
          - breaking

jobs:
  validate:
    name: SemVer 2.0.0 Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for tag comparison
      - name: Validate SemVer 2.0.0 compliance
        shell: pwsh
        run: |
          tools/validate-release-version.ps1 `
            -Version '${{ github.ref_name }}' `
            -DiffCategory '${{ inputs.diff_category || 'none' }}'

  build:
    name: Build & Test
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
        working-directory: FailSafe/extension
      - run: npm run compile
        working-directory: FailSafe/extension
      - run: xvfb-run -a npm run test:all
        working-directory: FailSafe/extension
      - name: Export governance context
        if: always()
        continue-on-error: true
        run: bash tools/export-governance-context.sh .failsafe-ci-context
      - name: Upload governance context
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: governance-context
          path: .failsafe-ci-context/
          retention-days: 30
      - run: npx vsce package
        working-directory: FailSafe/extension
      - run: npm run validate:vsix -- mythologiq-failsafe-${{ github.ref_name }}.vsix
        working-directory: FailSafe/extension
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: FailSafe/extension/*.vsix

  publish-vscode:
    name: Publish to VS Code Marketplace
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix
      - run: npx vsce publish --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  publish-openvsx:
    name: Publish to Open VSX
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix
      - run: npx ovsx publish *.vsix -p ${{ secrets.OVSX_TOKEN }}
